<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트비딩(Smart Bidding) 전술 레이더</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(10px); border: 1px solid #10b981; }
    </style>
</head>
<body class="p-8">
    <h1 class="text-3xl font-extrabold text-emerald-500 mb-2"><i class="fas fa-gavel"></i> 1004MAS SMART BIDDING</h1>
    <p class="text-gray-400 mb-8">조달청 국가 입찰 및 수주 방어망</p>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="glass p-6 rounded-xl">
            <h2 class="text-xl font-bold text-white mb-4">현재 목표 공고</h2>
            <ul class="space-y-4">
                <li class="bg-black/50 p-3 rounded-lg flex justify-between items-center">
                    <span class="text-white truncate">1순위: [무안군] 도로 아스콘 포장 공사</span>
                    <span class="text-emerald-400 font-bold ml-4">1.2억</span>
                </li>
                <li class="bg-black/50 p-3 rounded-lg flex justify-between items-center">
                    <span class="text-white truncate">2순위: [담양군] 마을회관 내진 보강</span>
                    <span class="text-emerald-400 font-bold ml-4">3.5억</span>
                </li>
            </ul>
        </div>
        
        <div class="glass p-6 rounded-xl border-l-4 border-emerald-500">
            <h2 class="text-lg font-bold text-white mb-2"><i class="fas fa-shield-alt"></i> 비상망 상태 (Firecrawl Guard)</h2>
            <p class="text-gray-300 text-sm leading-relaxed">
                조달청 G2B API 정상. 대체 파싱망 대기 중. 입찰 서류 머신러닝 분석 준비 완료.
            </p>
        </div>
    </div>

    <div class="mt-8 text-center"><a href="https://www.1004mas.com" class="text-emerald-500 hover:text-white underline">포탈(Portal) 복귀</a></div>
</body>
</html>
